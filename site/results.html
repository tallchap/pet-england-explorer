<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Email Batch Results</title>
  <style>
    body { font-family: Inter, system-ui, Arial, sans-serif; margin: 0; color: #111; }
    .top { padding: 12px; border-bottom: 1px solid #e5e7eb; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .pill { padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 999px; font-size: 12px; }
    .muted { color: #6b7280; font-size: 13px; }
    .wrap { padding: 12px; }
    .tableOuter { border: 1px solid #e5e7eb; border-radius: 8px; overflow: auto; max-height: 78vh; }
    table { border-collapse: collapse; min-width: 1400px; width: 100%; font-size: 13px; }
    th, td { border-bottom: 1px solid #f0f0f0; padding: 8px; text-align: left; white-space: nowrap; }
    th { position: sticky; top: 0; background: #f8fafc; z-index: 1; }
    tr:hover { background: #fafafa; }
    .status-valid { color: #166534; font-weight: 600; }
    .status-invalid { color: #991b1b; font-weight: 600; }
    .status-catch-all { color: #92400e; font-weight: 600; }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { background: #eef2ff; }
    .checkline { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="top">
    <strong>Email batch results</strong>
    <span id="meta" class="muted">Loading…</span>
    <span class="pill">Horizontal scroll enabled</span>
    <label class="checkline"><input type="checkbox" id="onlyWithEmail"> only rows with non-empty email</label>
  </div>
  <div class="wrap">
    <div class="tableOuter">
      <table>
        <thead>
          <tr>
            <th class="sortable" data-key="name">Name</th>
            <th class="sortable" data-key="place_id">Place ID</th>
            <th class="sortable" data-key="formatted_address">Address</th>
            <th class="sortable" data-key="website_domain">Website</th>
            <th class="sortable" data-key="best_email">Best Email</th>
            <th class="sortable" data-key="email_type">Email Type</th>
            <th class="sortable" data-key="verification_status">Verification</th>
            <th class="sortable" data-key="verification_sub_status">Sub-status</th>
            <th class="sortable" data-key="confidence_score">Confidence</th>
            <th class="sortable" data-key="candidates_found">Candidates</th>
            <th>Source URL</th>
            <th>Maps</th>
            <th class="sortable" data-key="processed_at">Processed At</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const p = new URLSearchParams(location.search);
    const rawBatch = p.get('batch') || 'batch_0001_0005';
    const batch = rawBatch.replace(/[^a-zA-Z0-9_-]/g, '');
    const dataPath = `../data/email_batches/${batch}_results.json`;

    function statusClass(s) {
      if (s === 'valid') return 'status-valid';
      if (s === 'invalid') return 'status-invalid';
      if (s === 'catch-all') return 'status-catch-all';
      return '';
    }

    let allRows = [];
    let sortKey = 'best_email';
    let sortDir = 'asc';

    function asComparable(v) {
      if (v == null) return '';
      const n = Number(v);
      if (!Number.isNaN(n) && String(v).trim() !== '') return n;
      return String(v).toLowerCase();
    }

    function render() {
      const onlyWithEmail = document.getElementById('onlyWithEmail').checked;
      let rows = [...allRows];
      if (onlyWithEmail) rows = rows.filter(r => String(r.best_email || '').trim() !== '');

      rows.sort((a, b) => {
        const av = asComparable(a[sortKey]);
        const bv = asComparable(b[sortKey]);
        if (typeof av === 'number' && typeof bv === 'number') return sortDir === 'asc' ? av - bv : bv - av;
        return sortDir === 'asc'
          ? String(av).localeCompare(String(bv))
          : String(bv).localeCompare(String(av));
      });

      document.getElementById('meta').textContent = `${batch} · showing ${rows.length.toLocaleString()} / ${allRows.length.toLocaleString()} rows · sort: ${sortKey} ${sortDir}`;

      const tbody = document.getElementById('tbody');
      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>${r.name || ''}</td>
          <td>${r.place_id || ''}</td>
          <td>${r.formatted_address || ''}</td>
          <td>${r.website_url ? `<a href="${r.website_url}" target="_blank">${r.website_domain || r.website_url}</a>` : ''}</td>
          <td>${r.best_email || ''}</td>
          <td>${r.email_type || ''}</td>
          <td class="${statusClass(r.verification_status)}">${r.verification_status || ''}</td>
          <td>${r.verification_sub_status || ''}</td>
          <td>${r.confidence_score ?? ''}</td>
          <td>${r.candidates_found ?? ''}</td>
          <td>${r.source_url ? `<a href="${r.source_url}" target="_blank">source</a>` : ''}</td>
          <td>${r.maps_url ? `<a href="${r.maps_url}" target="_blank">open</a>` : ''}</td>
          <td>${r.processed_at || ''}</td>
        </tr>
      `).join('');
    }

    document.querySelectorAll('th.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const key = th.dataset.key;
        if (!key) return;
        if (sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        else { sortKey = key; sortDir = 'asc'; }
        render();
      });
    });

    document.getElementById('onlyWithEmail').addEventListener('change', render);

    fetch(dataPath)
      .then(r => {
        if (!r.ok) throw new Error(`Could not load ${dataPath}`);
        return r.json();
      })
      .then(rows => {
        allRows = rows;
        render();
      })
      .catch(err => {
        document.getElementById('meta').textContent = `${err.message}. Tried: ${dataPath}`;
      });
  </script>
</body>
</html>
